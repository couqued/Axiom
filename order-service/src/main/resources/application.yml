server:
  port: 8082

spring:
  application:
    name: order-service
  config:
    import: optional:classpath:application-secret.yml
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/axiom?currentSchema=orders
    username: ${DB_USERNAME:axiom}
    password: ${DB_PASSWORD:axiom1234}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: orders
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

kis:
  mode: paper   # mock | paper | real
  paper:
    base-url: https://openapivts.koreainvestment.com:29443
    app-key: ${KIS_PAPER_APP_KEY:PLACEHOLDER}
    app-secret: ${KIS_PAPER_APP_SECRET:PLACEHOLDER}
    account-no: ${KIS_PAPER_ACCOUNT_NO:PLACEHOLDER}
  real:
    base-url: https://openapi.koreainvestment.com:9443
    app-key: ${KIS_REAL_APP_KEY:PLACEHOLDER}
    app-secret: ${KIS_REAL_APP_SECRET:PLACEHOLDER}
    account-no: ${KIS_REAL_ACCOUNT_NO:PLACEHOLDER}

market-service:
  url: ${MARKET_SERVICE_URL:http://localhost:8081}

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:PLACEHOLDER}
  enabled: ${SLACK_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health, info
