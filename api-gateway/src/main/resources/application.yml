server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: market-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/market/**
          filters:
            - RewritePath=/api/market/(?<segment>.*), /api/${segment}

        - id: order-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/orders/**

        - id: portfolio-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/portfolio/**

        - id: strategy-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/strategy/**

management:
  endpoints:
    web:
      exposure:
        include: health, info
