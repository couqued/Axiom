server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:classpath:application-secret.yml
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: market-service
          uri: ${MARKET_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/market/**
          filters:
            - RewritePath=/api/market/(?<segment>.*), /api/${segment}

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/orders/**

        - id: portfolio-service
          uri: ${PORTFOLIO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/portfolio/**

        - id: strategy-service
          uri: ${STRATEGY_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/strategy/**

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:PLACEHOLDER}
  enabled: ${SLACK_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health, info
