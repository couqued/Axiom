apiVersion: v1
kind: ConfigMap
metadata:
  name: axiom-config
  namespace: axiom
data:
  # 데이터베이스
  DB_HOST: "postgres"
  DB_USERNAME: "axiom"

  # Kafka
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"

  # 서비스 내부 URL (K8s DNS)
  MARKET_SERVICE_URL: "http://market-service:8081"
  ORDER_SERVICE_URL: "http://order-service:8082"
  PORTFOLIO_SERVICE_URL: "http://portfolio-service:8083"
  STRATEGY_SERVICE_URL: "http://strategy-service:8084"

  # strategy-service admin-config.json 경로 (PVC 마운트 위치)
  ADMIN_CONFIG_PATH: "/app/data/admin-config.json"

  # Slack
  SLACK_ENABLED: "true"
