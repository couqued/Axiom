apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-watcher
  namespace: axiom
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: axiom
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-watcher-binding
  namespace: axiom
subjects:
  - kind: ServiceAccount
    name: pod-watcher
    namespace: axiom
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
