# ── DB 초기화 스크립트 ────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: axiom
data:
  init-db.sql: |
    CREATE SCHEMA IF NOT EXISTS market;
    CREATE SCHEMA IF NOT EXISTS orders;
    CREATE SCHEMA IF NOT EXISTS portfolio;
---
# ── PersistentVolumeClaim ─────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: axiom
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# ── StatefulSet ───────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: axiom
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: axiom
            - name: POSTGRES_USER
              value: axiom
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: axiom-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "axiom", "-d", "axiom"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-script
          configMap:
            name: postgres-init
---
# ── Service (ClusterIP) ───────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: axiom
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
